<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 320" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4fd1c5"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e53e3e"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="320" rx="12" fill="#f7fafc"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a202c">AARS Pipeline — Agentic Adaptive Retrieval</text>

  <!-- Stage 1: User Query -->
  <rect x="20" y="80" width="160" height="70" rx="10" fill="#1a365d" filter="url(#shadow)"/>
  <text x="100" y="110" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">User Query</text>
  <text x="100" y="130" text-anchor="middle" font-size="10" fill="#a0aec0">Natural language input</text>

  <!-- Arrow 1→2 -->
  <line x1="180" y1="115" x2="218" y2="115" stroke="#4fd1c5" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Stage 2: Planner Agent -->
  <rect x="220" y="80" width="160" height="70" rx="10" fill="#1a365d" filter="url(#shadow)"/>
  <rect x="220" y="80" width="160" height="4" rx="2" fill="#4fd1c5"/>
  <text x="300" y="110" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Planner Agent</text>
  <text x="300" y="130" text-anchor="middle" font-size="10" fill="#a0aec0">Strategy selection</text>

  <!-- Arrow 2→3 -->
  <line x1="380" y1="115" x2="418" y2="115" stroke="#4fd1c5" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Stage 3: Retrieval Engine -->
  <rect x="420" y="80" width="160" height="70" rx="10" fill="#1a365d" filter="url(#shadow)"/>
  <rect x="420" y="80" width="160" height="4" rx="2" fill="#4fd1c5"/>
  <text x="500" y="110" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Retrieval Engine</text>
  <text x="500" y="130" text-anchor="middle" font-size="10" fill="#a0aec0">Vector / BM25 / Graph</text>

  <!-- Arrow 3→4 -->
  <line x1="580" y1="115" x2="618" y2="115" stroke="#4fd1c5" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Stage 4: Reflection Agent -->
  <rect x="620" y="80" width="160" height="70" rx="10" fill="#1a365d" filter="url(#shadow)"/>
  <rect x="620" y="80" width="160" height="4" rx="2" fill="#e53e3e"/>
  <text x="700" y="110" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Reflection Agent</text>
  <text x="700" y="130" text-anchor="middle" font-size="10" fill="#a0aec0">Sufficiency check</text>

  <!-- Arrow 4→5 -->
  <line x1="780" y1="115" x2="818" y2="115" stroke="#4fd1c5" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Stage 5: Fusion + Answer -->
  <rect x="820" y="80" width="160" height="70" rx="10" fill="#1a365d" filter="url(#shadow)"/>
  <rect x="820" y="80" width="160" height="4" rx="2" fill="#48bb78"/>
  <text x="900" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Fusion + Diversity</text>
  <text x="900" y="122" text-anchor="middle" font-size="10" fill="#a0aec0">RRF → MMR rerank</text>
  <text x="900" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#48bb78">→ Answer</text>

  <!-- Retry loop: Reflection → Retrieval -->
  <path d="M 700 150 L 700 200 Q 700 220 680 220 L 520 220 Q 500 220 500 200 L 500 150" fill="none" stroke="#e53e3e" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrow-red)"/>
  <rect x="555" y="208" width="90" height="24" rx="4" fill="#fff5f5" stroke="#e53e3e" stroke-width="1"/>
  <text x="600" y="224" text-anchor="middle" font-size="11" font-weight="600" fill="#e53e3e">retry max 3x</text>

  <!-- Sub-retriever labels -->
  <rect x="260" y="185" width="75" height="28" rx="6" fill="#ebf8ff" stroke="#4299e1" stroke-width="1"/>
  <text x="297" y="204" text-anchor="middle" font-size="10" font-weight="500" fill="#2b6cb0">Vector</text>

  <rect x="345" y="185" width="75" height="28" rx="6" fill="#f0fff4" stroke="#48bb78" stroke-width="1"/>
  <text x="382" y="204" text-anchor="middle" font-size="10" font-weight="500" fill="#276749">BM25</text>

  <rect x="260" y="220" width="75" height="28" rx="6" fill="#faf5ff" stroke="#9f7aea" stroke-width="1"/>
  <text x="297" y="239" text-anchor="middle" font-size="10" font-weight="500" fill="#6b46c1">Graph</text>

  <rect x="345" y="220" width="75" height="28" rx="6" fill="#fffaf0" stroke="#ed8936" stroke-width="1"/>
  <text x="382" y="239" text-anchor="middle" font-size="10" font-weight="500" fill="#c05621">Hybrid</text>

  <!-- Planner → sub-retrievers arrow -->
  <line x1="300" y1="150" x2="300" y2="183" stroke="#a0aec0" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="30" y="275" width="12" height="12" rx="2" fill="#4fd1c5"/>
  <text x="48" y="286" font-size="11" fill="#4a5568">Data flow</text>
  <line x1="120" y1="281" x2="150" y2="281" stroke="#e53e3e" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="158" y="286" font-size="11" fill="#4a5568">Retry loop</text>
  <rect x="250" y="275" width="12" height="12" rx="2" fill="#1a365d"/>
  <text x="268" y="286" font-size="11" fill="#4a5568">Pipeline stage</text>
</svg>
