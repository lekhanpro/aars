  </text>

  <rect x="628" y="348" width="296" height="46" rx="23" fill="#efe5d4" stroke="#d5c2a8"/>
  <text x="776" y="377" text-anchor="middle" font-size="13" font-weight="600" fill="#8c4f1b">
