<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="430" rx="20" fill="#f7f4ed"/>
  <text x="480" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#14222b">
    AARS Local Fixture Benchmark
  </text>
  <text x="480" y="68" text-anchor="middle" font-size="13" fill="#566975">
    Reproducible offline benchmark. 12 documents, 9 questions, deterministic runner.
  </text>

  <rect x="36" y="94" width="888" height="58" rx="14" fill="#14222b" filter="url(#shadow)"/>
  <text x="140" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#fffaf1">System</text>
  <text x="330" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#fffaf1">Exact Match</text>
  <text x="450" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#fffaf1">Token F1</text>
  <text x="590" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#fffaf1">Recall@3</text>
  <text x="735" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#fffaf1">Precision@3</text>
  <text x="860" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#fffaf1">MRR@5</text>

  <rect x="36" y="166" width="888" height="56" rx="12" fill="#d8f0ea" stroke="#8bcabc"/>
  <text x="140" y="201" text-anchor="middle" font-size="14" font-weight="700" fill="#115e59">AARS</text>
  <text x="330" y="201" text-anchor="middle" font-size="14" font-weight="700" fill="#115e59">1.000</text>
  <text x="450" y="201" text-anchor="middle" font-size="14" font-weight="700" fill="#115e59">1.000</text>
  <text x="590" y="201" text-anchor="middle" font-size="14" font-weight="700" fill="#115e59">1.000</text>
  <text x="735" y="201" text-anchor="middle" font-size="14" font-weight="700" fill="#115e59">0.537</text>
  <text x="860" y="201" text-anchor="middle" font-size="14" font-weight="700" fill="#115e59">0.944</text>

  <rect x="36" y="232" width="888" height="48" rx="12" fill="#fffaf1" stroke="#d8d0c2"/>
  <text x="140" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#14222b">AARS no reflection</text>
  <text x="330" y="262" text-anchor="middle" font-size="13" fill="#14222b">1.000</text>
  <text x="450" y="262" text-anchor="middle" font-size="13" fill="#14222b">1.000</text>
  <text x="590" y="262" text-anchor="middle" font-size="13" fill="#14222b">1.000</text>
  <text x="735" y="262" text-anchor="middle" font-size="13" fill="#14222b">0.537</text>
  <text x="860" y="262" text-anchor="middle" font-size="13" fill="#14222b">0.944</text>

  <rect x="36" y="286" width="888" height="48" rx="12" fill="#fffaf1" stroke="#d8d0c2"/>
  <text x="140" y="316" text-anchor="middle" font-size="13" font-weight="600" fill="#14222b">NaiveRAG</text>
  <text x="330" y="316" text-anchor="middle" font-size="13" fill="#14222b">1.000</text>
  <text x="450" y="316" text-anchor="middle" font-size="13" fill="#14222b">1.000</text>
  <text x="590" y="316" text-anchor="middle" font-size="13" fill="#14222b">1.000</text>
  <text x="735" y="316" text-anchor="middle" font-size="13" fill="#14222b">0.444</text>
  <text x="860" y="316" text-anchor="middle" font-size="13" fill="#14222b">0.944</text>

  <rect x="36" y="348" width="275" height="46" rx="23" fill="#14222b"/>
  <text x="173" y="377" text-anchor="middle" font-size="13" font-weight="700" fill="#fffaf1">
